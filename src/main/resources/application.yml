spring:
  application:
    name: taskmaster

  # --- Default datasource: in-memory H2 (zero setup; resets on restart) ---
  datasource:
    url: jdbc:h2:mem:taskmaster;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update        # auto-create/update schema from entities
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  # Browse the H2 database at http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

  # Limits for file uploads (attachments)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: 8080

# --- Application-specific settings ---
app:
  jwt:
    # Override in production via the APP_JWT_SECRET environment variable.
    secret: ${APP_JWT_SECRET:change-this-secret-in-production-min-32-bytes-long!!}
    expiration-ms: 86400000   # 24 hours
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
  ai:
    enabled: ${APP_AI_ENABLED:false}
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${APP_AI_MODEL:claude-sonnet-4-6}
    base-url: https://api.anthropic.com

# Swagger UI available at http://localhost:8080/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
