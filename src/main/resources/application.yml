spring:
  application:
    name: taskmaster

  # --- Default datasource: PostgreSQL ---
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskmaster}
    username: ${DB_USERNAME:taskmaster}
    password: ${DB_PASSWORD:taskmaster}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update        # auto-create/update schema from entities
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  # Limits for file uploads (attachments)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: 8080

# --- Application-specific settings ---
app:
  jwt:
    # Override in production via the APP_JWT_SECRET environment variable.
    secret: ${APP_JWT_SECRET:change-this-secret-in-production-min-32-bytes-long!!}
    expiration-ms: 86400000   # 24 hours
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
  ai:
    enabled: ${APP_AI_ENABLED:false}
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${APP_AI_MODEL:claude-sonnet-4-6}
    base-url: https://api.anthropic.com
  cors:
    # Comma-separated list of origins allowed to call this API (e.g. a separately deployed frontend).
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Swagger UI available at http://localhost:8080/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
