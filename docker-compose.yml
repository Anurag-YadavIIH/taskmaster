services:
  db:
    image: postgres:16
    container_name: taskmaster-postgres
    environment:
      POSTGRES_DB: taskmaster
      POSTGRES_USER: taskmaster
      POSTGRES_PASSWORD: taskmaster
    ports:
      - "5434:5432"
    volumes:
      - taskmaster-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmaster -d taskmaster"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmaster-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/taskmaster
      DB_USERNAME: taskmaster
      DB_PASSWORD: taskmaster
      # Override in production with a strong, random secret (>= 32 bytes).
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-this-secret-in-production-min-32-bytes-long!!}
      APP_UPLOAD_DIR: /app/uploads
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8081,http://localhost:5173
    ports:
      - "8082:8080"
    volumes:
      - taskmaster-uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8082
    container_name: taskmaster-frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  taskmaster-postgres-data:
  taskmaster-uploads:
